[build]
  publish = "."
  functions = "netlify/functions"

# Serve index.html for all routes — /about opens the modal, unknown paths redirect to /
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
