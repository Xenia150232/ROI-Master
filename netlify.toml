[build]
  publish = "."
  functions = "netlify/functions"

# Extend function timeout for AI thinking-mode responses (DeepSeek reasoning can take 15-25s)
[functions]
  node_bundler = "esbuild"

[functions."chat-ai"]
  # Max 26s on Netlify free tier — generous budget for LLM reasoning chains
  timeout = 26

# Serve index.html for all routes — /about opens the modal, unknown paths redirect to /
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
