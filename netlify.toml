[build]
  publish = "."
  functions = "netlify/functions"

# Extend function timeout for AI thinking-mode responses (DeepSeek reasoning can take 15-25s)
[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@netlify/blobs"]

[functions."chat-ai"]
  # Max 26s on Netlify free tier — generous budget for LLM reasoning chains
  timeout = 26

# Redirect www to non-www
[[redirects]]
  from = "https://www.roimaster.netlify.app/*"
  to = "https://roimaster.netlify.app/:splat"
  status = 301
  force = true

# Pass through static assets so social crawlers can fetch OG images
[[redirects]]
  from = "/public/*"
  to = "/public/:splat"
  status = 200

# Serve index.html for all routes — /about opens the modal, unknown paths redirect to /
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/public/Images/*.png"
  [headers.values]
    Content-Type = "image/png"
    Cache-Control = "public, max-age=86400"
